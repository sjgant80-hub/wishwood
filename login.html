<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Wishwood · Log in</title>
<meta name="description" content="Wishwood operator login. Enter master password to access the hub.">
<meta name="theme-color" content="#18171a">
<meta name="robots" content="noindex,nofollow">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --woodsmoke:#18171a;--deep:#1f1e22;--surface:#27262b;
  --moss:#2d4a3e;--moss-bright:#3d6a55;--leaf:#6b9d6f;
  --ember:#c97a3d;--ember-glow:rgba(201,122,61,0.12);
  --gold:#c9a84c;--linen:#ebe5d6;
  --text:#d4cfc8;--muted:#7a7681;
  --border:rgba(235,229,214,0.08);--border-strong:rgba(235,229,214,0.18);
  --bad:#c75a4a;--good:#6b9d6f;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{background:var(--woodsmoke);color:var(--text);font-family:'Inter',-apple-system,system-ui,sans-serif;font-size:15px;line-height:1.65;display:flex;align-items:center;justify-content:center;padding:24px;background:radial-gradient(ellipse at top,var(--moss) 0%,var(--woodsmoke) 60%)}
.card{background:var(--deep);border:1px solid var(--border-strong);border-radius:10px;padding:44px 40px;max-width:420px;width:100%;box-shadow:0 12px 40px rgba(0,0,0,.5)}
.brand{display:flex;align-items:center;gap:10px;margin-bottom:28px;font-family:'Cormorant Garamond',serif;font-size:26px;color:var(--linen);letter-spacing:0.02em}
.brand .glyph{color:var(--ember);font-size:30px}
h1{font-family:'Cormorant Garamond',serif;font-size:26px;color:var(--linen);font-weight:400;margin-bottom:6px;line-height:1.2}
h1 em{color:var(--ember);font-style:italic}
.subtitle{color:var(--muted);font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.14em;text-transform:uppercase;margin-bottom:28px}
label{display:block;margin-bottom:14px}
label small{display:block;font-family:'JetBrains Mono',monospace;color:var(--muted);font-size:11px;letter-spacing:0.06em;text-transform:uppercase;margin-bottom:6px}
input{width:100%;padding:14px 16px;background:var(--woodsmoke);border:1px solid var(--border-strong);border-radius:4px;color:var(--linen);font-family:'Inter',sans-serif;font-size:15px}
input:focus{outline:none;border-color:var(--ember);box-shadow:0 0 0 3px var(--ember-glow)}
.btn{width:100%;padding:14px;background:var(--ember);color:var(--woodsmoke);border:0;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.14em;text-transform:uppercase;font-weight:600;border-radius:4px;cursor:pointer;transition:background .15s;margin-top:8px}
.btn:hover{background:var(--gold)}
.btn:disabled{background:var(--muted);cursor:not-allowed}
.msg{margin-top:16px;padding:12px 14px;border-radius:4px;font-family:'JetBrains Mono',monospace;font-size:12px;line-height:1.5;display:none}
.msg.err{display:block;background:rgba(199,90,74,.12);color:var(--bad);border:1px solid var(--bad)}
.msg.ok{display:block;background:rgba(107,157,111,.12);color:var(--good);border:1px solid var(--good)}
.hint{margin-top:22px;padding-top:20px;border-top:1px solid var(--border);color:var(--muted);font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.06em;line-height:1.7}
.hint a{color:var(--ember);text-decoration:none}
.hint a:hover{color:var(--gold)}
.stay-signed{display:flex;align-items:center;gap:8px;margin:10px 0 6px;color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace}
.stay-signed input[type=checkbox]{width:auto}
</style>
</head>
<body>
<div class="card">
  <div class="brand"><span class="glyph">◊</span>Wishwood</div>
  <h1>Log in <em>to the hub</em>.</h1>
  <div class="subtitle">◆ Operator access · Chrissy + trusted staff</div>

  <form id="loginForm" onsubmit="return doLogin(event)">
    <label>
      <small>Master password</small>
      <input type="password" id="pw" autocomplete="current-password" required autofocus>
    </label>
    <label class="stay-signed">
      <input type="checkbox" id="stay" checked>
      <span>Stay signed in on this device (30 days)</span>
    </label>
    <button class="btn" id="submitBtn">Enter</button>
    <div class="msg" id="msg"></div>
  </form>

  <div class="hint">
    <p>◆ First-time setup? See <a href="docs/AUTH-SETUP.md" target="_blank">AUTH-SETUP.md</a> for how Chrissy sets her password.</p>
    <p style="margin-top:8px">◆ Forgot the password? Chrissy rotates it with <code>wrangler secret put MASTER_PASSWORD</code>.</p>
  </div>
</div>

<script>
// ── Config · edit if you renamed the Worker ───────────────────────
const WORKER_URL = 'https://wishwood-engine.workers.dev';

// If already logged in with unexpired token, skip straight to hub
const stored = localStorage.getItem('wishwood.session');
if (stored) {
  try {
    const s = JSON.parse(stored);
    if (s.exp && Math.floor(Date.now()/1000) < s.exp) {
      location.replace('hub.html');
    }
  } catch { /* proceed to login */ }
}

async function doLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('submitBtn');
  const msg = document.getElementById('msg');
  const pw = document.getElementById('pw').value;
  const stay = document.getElementById('stay').checked;

  msg.className = 'msg';
  btn.disabled = true;
  btn.textContent = 'Checking…';

  try {
    const r = await fetch(WORKER_URL + '/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pw }),
    });
    if (!r.ok) {
      const err = await r.json().catch(() => ({ error: 'login failed' }));
      msg.className = 'msg err';
      msg.textContent = err.error || 'wrong password';
      btn.disabled = false;
      btn.textContent = 'Enter';
      document.getElementById('pw').select();
      return false;
    }
    const data = await r.json();
    const record = { token: data.token, exp: data.exp, sub: data.sub, savedAt: Date.now() };
    (stay ? localStorage : sessionStorage).setItem('wishwood.session', JSON.stringify(record));
    msg.className = 'msg ok';
    msg.textContent = 'Welcome. Redirecting…';
    setTimeout(() => location.replace('hub.html'), 400);
  } catch (err) {
    msg.className = 'msg err';
    msg.textContent = 'Network error · check Worker URL: ' + WORKER_URL;
    btn.disabled = false;
    btn.textContent = 'Enter';
  }
  return false;
}
</script>
<script defer src="ww-nav.js"></script>
<script defer src="ww-pwa.js"></script>
</body>
</html>
