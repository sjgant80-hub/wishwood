name = "wishwood-engine"
main = "worker.js"
compatibility_date = "2026-06-01"

# Set per-env via `wrangler secret put`:
#   MASTER_PASSWORD      — Chrissy's operator password (browser login via login.html)
#   SESSION_SECRET       — random 32-byte hex, signs the session JWT
#                          generate with: openssl rand -hex 32
#   OPERATOR_TOKEN       — legacy static bearer for API clients / cron (optional)
#   FB_VERIFY_TOKEN      — Meta webhook verify token
#   GEMINI_API_KEY       — Google Gemini key (Gemini Flash) · drafts the replies · free at aistudio.google.com/apikey
#   GEMINI_MODEL         — optional · defaults to gemini-2.5-flash
#   CLAUDE_API_KEY       — optional Anthropic key (fallback if no Gemini key)
#
#   ── GUEST CHANNELS · add each secret as you get it; its /webhook route activates automatically ──
#   TWILIO_ACCOUNT_SID · TWILIO_AUTH_TOKEN · SMS_FROM_NUMBER · WHATSAPP_SENDER   — Twilio SMS + WhatsApp  → point Twilio webhook at /webhook/twilio
#   META_ACCESS_TOKEN · WHATSAPP_PHONE_ID · WA_WEBHOOK_VERIFY_TOKEN              — Meta WhatsApp Cloud (alternative to Twilio) → /webhook/whatsapp
#   RESEND_API_KEY · EMAIL_FROM                                                  — email send (Resend)   → forward OTA/guest email to /webhook/email
#   AUTO_SEND = "1"                                                              — optional: AI auto-replies (default off = you approve every send)
#   STRIPE_WEBHOOK_SECRET — Stripe webhook signing secret
#   STRIPE_SECRET_KEY    — Stripe API key
#   AIRBNB_ICAL_HOBBIT   — Airbnb iCal export URL for Hobbit Hut
#   AIRBNB_ICAL_CARAVAN  — Airbnb iCal export URL for Vintage Caravan
#   AIRBNB_ICAL_YURT     — Airbnb iCal export URL for Family Yurt
#   PITCHUP_ICAL_YURT    — Pitchup iCal export URL

# KV namespace for bookings, messages, journey queue
[[kv_namespaces]]
binding = "WISHWOOD_KV"
id = "d30e9f71cfac477184b0c6c1934e4b17"

# Cron: iCal sync + journey queue flush every minute
[triggers]
crons = ["* * * * *"]
